name: CCPA
description: California Consumer Privacy Act - A state statute intended to enhance
  privacy rights and consumer protection for residents of California, USA. Provides
  consumers with rights to know what personal information is collected, delete personal
  data, opt-out of data sales, and non-discrimination for exercising privacy rights.
